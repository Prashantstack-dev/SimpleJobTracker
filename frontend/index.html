<!doctype html>
<html lang="en">
  <head>
    <title>Job Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>My Job Applications</h1>

    <div id="job-container">
      <input
        type="text"
        id="job-search"
        placeholder="Search by company or role..."
      />
      <input type="text" id="note" placeholder="Add a note..." />
      <form id="job-form">
        <input type="text" id="company" placeholder="Company Name" required />
        <input type="text" id="position" placeholder="Job Position" required />
        <button id="addJob" type="submit">Add Job</button>
      </form>
      <ul id="job-list"></ul>

    </div>

    <!-- <script src="app.js"></script> -->
    <!-- <script src="new_app.js"></script> -->
    <!-- <script src="practiceArbeitnowUrl.js"></script> -->
    <script type="module" src="allJobs.js"></script>
  </body>
</html>
